name: Website-Deployment

on:
  workflow_dispatch:
    inputs:
      baseversion:
        description: 'Image base version'
        required: true
        default: '1.0'
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - 'DEPLOYMENT.md'
      - 'CLAUDE.md'

permissions:
  contents: read
  # F-004: OIDC gegen k3s-apiserver, User `gha:repo:SeBastArt/cv-website:ref:refs/heads/master`.
  id-token: write

env:
  # F-006 begleit-paket: pinned Trivy for reproducible scans.
  TRIVY_VERSION: "0.70.0"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Prepare Version
        id: prepare
        run: |
          # Create version like v1.0.<run_number>
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ github.event.inputs.baseversion }}.${GITHUB_RUN_NUMBER}"
          else
            VERSION="v1.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
    env:
      DOCKER_TARGET_PLATFORM: linux/arm64
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push website image
        id: publish
        # F-006: `:latest`-Tag entfernt (redundanter Supply-Chain-Hazard). Der
        # `--metadata-file`-Flag gibt uns den konkreten Manifest-Digest
        # zurück, den wir dann an Helm durchreichen.
        run: |
          set -euo pipefail
          docker buildx build . \
            --platform "$DOCKER_TARGET_PLATFORM" \
            --file Dockerfile \
            --tag sebastart/sebastianschueler-website:${{ needs.prepare.outputs.version }} \
            --metadata-file metadata.json \
            --push
          DIGEST=$(jq -r '."containerimage.digest"' metadata.json)
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            echo "ERROR: digest missing from buildx metadata"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Built $DIGEST"

      # F-H-18: Keyless Cosign-Signatur direkt nach buildx --push. docker/login-
      # action hat oben ~/.docker/config.json schon gesetzt, Cosign nutzt die
      # Credentials. GitHub-OIDC-Zertifikat via Fulcio, Signatur landet als
      # sebastart/sebastianschueler-website:sha256-<digest>.sig in DockerHub.
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: 'v2.5.0'

      - name: Sign image (keyless, GitHub OIDC)
        env:
          IMAGE: sebastart/sebastianschueler-website
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          set -euo pipefail
          [ -n "$DIGEST" ] || { echo "ERROR: digest empty"; exit 1; }
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "Signature pushed for ${IMAGE}@${DIGEST}"

  # F-006 begleit-paket — Trivy scan after push, before deploy.
  scan:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Install Trivy
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          TMP="$(mktemp -d)"
          curl -sSfL -o "$TMP/trivy.tar.gz" \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf "$TMP/trivy.tar.gz" -C "$TMP" trivy
          mv "$TMP/trivy" "$HOME/bin/trivy"
          chmod +x "$HOME/bin/trivy"
          rm -rf "$TMP"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Write Docker Hub auth
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.docker"
          AUTH=$(printf '%s:%s' "$DH_USER" "$DH_TOKEN" | base64 -w0)
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' "$AUTH" > "$HOME/.docker/config.json"
          chmod 600 "$HOME/.docker/config.json"

      - name: Prime Trivy DB
        run: trivy image --download-db-only

      - name: SARIF scan
        run: |
          # Image ist arm64-only; Trivy läuft auf ubuntu-latest (amd64).
          # Explizit `--platform linux/arm64` lädt den richtigen Manifest.
          trivy image --platform linux/arm64 --format sarif --severity CRITICAL,HIGH --ignore-unfixed \
            --exit-code 0 --output trivy.sarif \
            "sebastart/sebastianschueler-website:${{ needs.prepare.outputs.version }}"

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-sarif-${{ needs.prepare.outputs.version }}
          path: trivy.sarif
          retention-days: 30

      - name: SBOM
        run: |
          trivy image --platform linux/arm64 --format cyclonedx --output sbom.cdx.json \
            "sebastart/sebastianschueler-website:${{ needs.prepare.outputs.version }}"

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ needs.prepare.outputs.version }}
          path: sbom.cdx.json
          retention-days: 90

      - name: Gate on fixable CRITICALs
        run: |
          trivy image --platform linux/arm64 --severity CRITICAL --ignore-unfixed --exit-code 1 --format table \
            "sebastart/sebastianschueler-website:${{ needs.prepare.outputs.version }}"

  deploy:
    needs: [build, scan, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh
      - name: Configure Kubeconfig via GitHub Actions OIDC
        env:
          AUDIENCE: https://kubernetes.wetrade.cluster.local
          K8S_API_SERVER: ${{ vars.K8S_API_SERVER }}
          K8S_CA_DATA: ${{ vars.K8S_CA_DATA }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -sSfL             "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}"             -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"             | jq -r '.value')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: failed to obtain GitHub OIDC token"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          mkdir -p "$HOME/.kube"
          cat > "$HOME/.kube/config" <<EOF
          apiVersion: v1
          kind: Config
          clusters:
          - name: cluster
            cluster:
              server: ${K8S_API_SERVER}
              certificate-authority-data: ${K8S_CA_DATA}
          users:
          - name: gha-oidc
            user:
              token: ${TOKEN}
          contexts:
          - name: default
            context:
              cluster: cluster
              user: gha-oidc
          current-context: default
          EOF
          chmod 600 "$HOME/.kube/config"
          kubectl auth whoami

      - name: Verify Kubernetes connection
        run: |
          kubectl auth whoami
      - name: Deploy with Helm
        run: |
          set -euo pipefail
          DIGEST="${{ needs.build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "ERROR: build job did not expose a digest (F-006 gate)"
            exit 1
          fi
          # --wait weggelassen: das GH-Actions-OIDC-Token läuft nach 5min aus,
          # helm's interne Status-Polls bekommen dann 401 "Unauthorized".
          # Stattdessen separates kubectl rollout status (frisches Token pro
          # kubectl-Aufruf).
          helm upgrade --install sebastianschueler-website ./helm/sebastianschueler-website \
            --create-namespace \
            --namespace sebastianschueler \
            --set website.imageVersion=${{ needs.prepare.outputs.version }} \
            --set website.imageDigest=$DIGEST \
            --timeout=120s
          kubectl rollout status deploy/website -n sebastianschueler --timeout=180s
      - name: Verify deployment
        run: |
          kubectl get pods -n sebastianschueler
          kubectl get services -n sebastianschueler