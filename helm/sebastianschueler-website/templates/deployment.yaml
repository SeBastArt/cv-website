apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: {{ .Values.namespace.name }}
  labels:
    app: website
    {{ include "sebastianschueler-website.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.website.replicas }}
  selector:
    matchLabels:
      app: website
      {{ include "sebastianschueler-website.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: website
        version: {{ .Values.website.version | default "v1" }}
        {{ include "sebastianschueler-website.selectorLabels" . | nindent 8 }}
    spec:
      # F-003 (Ausdehnung 2026-04-21): Pod-level Seccomp + runAsNonRoot.
      # Container-SC war bereits gehaertet (runAsUser: 101, caps.drop=[ALL],
      # aPE=false). Hinzugefuegt: readOnlyRootFilesystem=true + pod-level
      # seccompProfile=RuntimeDefault.
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: website
          image: {{ include "website.image" .Values.website | quote }}
          imagePullPolicy: {{ include "website.imagePullPolicy" .Values.website }}
          ports:
          - containerPort: {{ .Values.website.targetPort }}
            name: http
            protocol: TCP
          {{- if .Values.website.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- end }}
          resources:
            {{ toYaml .Values.website.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
          - name: tmp-volume
            mountPath: /tmp
          - name: var-cache-nginx
            mountPath: /var/cache/nginx
          - name: var-run
            mountPath: /var/run
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: var-cache-nginx
        emptyDir: {}
      - name: var-run
        emptyDir: {}
