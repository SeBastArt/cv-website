apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sebastianschueler-certificate
  namespace: istio-system
spec:
  # Secret name that will be created/updated with the certificate
  secretName: sebastianschueler-cert
  # Renew certificate 30 days before expiration
  renewBefore: 720h # 30 days
  # Domains to include in the certificate.
  # Wildcard covers www + any future subdomain; apex explicit (wildcard
  # does not match the bare domain). Requires DNS-01 (LE forbids wildcard
  # via HTTP-01) — the letsencrypt-prod issuer uses the IONOS DNS-01 webhook
  # since 2026-07-21.
  dnsNames:
  - sebastianschueler.de
  - "*.sebastianschueler.de"
  # Reference to the ClusterIssuer
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  # Private key configuration
  privateKey:
    algorithm: RSA
    size: 2048
