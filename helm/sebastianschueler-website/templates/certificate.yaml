apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sebastianschueler-certificate
  namespace: istio-system
spec:
  # Secret name that will be created/updated with the certificate
  secretName: sebastianschueler-cert
  # Renew certificate 30 days before expiration
  renewBefore: 720h # 30 days
  # Domains to include in the certificate
  dnsNames:
  - sebastianschueler.de
  - www.sebastianschueler.de
  # Reference to the ClusterIssuer
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  # Private key configuration
  privateKey:
    algorithm: RSA
    size: 2048
