apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: ingress-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: telemetry-gw-cert
      hosts:
        - "*.wondering-developer.de"

    - port:
        number: 443
        name: https-sebastian
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: sebastianschueler-cert
      hosts:
        - "sebastianschueler.de"
        - "www.sebastianschueler.de"
    - port:
        number: 80
        name: http-sebastian
        protocol: HTTP
      hosts:
        - "sebastianschueler.de"
        - "www.sebastianschueler.de"